<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
    <title>Starting Iron Jarvis…</title>
    <style>
      :root {
        --bg: #0a0a0f;
        --crimson: #e11d2a;
        --crimson-soft: rgba(225, 29, 42, 0.55);
        --ink: #e8e8ee;
        --muted: #8a8a97;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(120% 120% at 50% 30%, #14141c 0%, var(--bg) 60%);
        color: var(--ink);
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
      }
      /* Arc-reactor-ish pulsing core */
      .reactor {
        position: relative;
        width: 120px;
        height: 120px;
        display: grid;
        place-items: center;
      }
      .ring {
        position: absolute;
        border-radius: 50%;
        border: 2px solid var(--crimson-soft);
      }
      .ring.outer { inset: 0; animation: spin 4s linear infinite; border-top-color: var(--crimson); }
      .ring.mid   { inset: 16px; animation: spin 2.6s linear infinite reverse; border-bottom-color: var(--crimson); }
      .core {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 45%, #ff6b73 0%, var(--crimson) 45%, #5e0a10 100%);
        box-shadow: 0 0 24px 6px var(--crimson-soft), 0 0 60px 14px rgba(225, 29, 42, 0.25);
        animation: pulse 1.8s ease-in-out infinite;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.5px;
        font-weight: 600;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }
      .dots::after {
        content: "";
        animation: dots 1.4s steps(4, end) infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { transform: scale(1);    opacity: 0.9; }
        50%      { transform: scale(1.12); opacity: 1;   }
      }
      @keyframes dots {
        0%   { content: ""; }
        25%  { content: "."; }
        50%  { content: ".."; }
        75%  { content: "..."; }
        100% { content: ""; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="reactor">
        <div class="ring outer"></div>
        <div class="ring mid"></div>
        <div class="core"></div>
      </div>
      <h1>Starting Iron Jarvis<span class="dots"></span></h1>
      <p>Booting the daemon and dashboard — this can take a few seconds.</p>
    </div>
  </body>
</html>
