name: Tests

# The offline suite + dashboard build on every push/PR. This is the single
# source of truth for "how many tests are there and do they pass" — the README
# carries the badge instead of a hand-edited count (which drifted three times:
# 254 → 687 → 971 all claimed at once in different files).

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: windows-latest # mirrors the packaged product (ConPTY terminals etc.)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Sync Python deps
        run: uv sync --extra dev

      - name: Run the offline suite
        shell: bash
        run: |
          uv run pytest -q --no-header | tee pytest-out.txt
          tail -1 pytest-out.txt >> "$GITHUB_STEP_SUMMARY"

  dashboard:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: Production build
        working-directory: dashboard
        run: npm run build
